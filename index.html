<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的永久留言板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --body-bg: linear-gradient(135deg, #eef2ff, #f8fafc, #dbeafe);
            --card-bg: rgba(255,255,255,0.78);
            --panel-bg: rgba(255,255,255,0.72);
            --sidebar-bg: rgba(248,249,250,0.72);
            --list-bg: rgba(249,249,249,0.74);
            --text-main: #111;
            --text-sub: #555;
            --border-color: rgba(0,0,0,0.08);
            --bubble-bg: #95ec69;
            --input-bg: rgba(255,255,255,0.88);
            --shadow: 0 18px 45px rgba(15,23,42,0.14);
        }

        body.dark {
            --body-bg: linear-gradient(135deg, #0f172a, #111827, #1e293b);
            --card-bg: rgba(15,23,42,0.78);
            --panel-bg: rgba(15,23,42,0.72);
            --sidebar-bg: rgba(17,24,39,0.72);
            --list-bg: rgba(15,23,42,0.62);
            --text-main: #e5e7eb;
            --text-sub: #a1a1aa;
            --border-color: rgba(255,255,255,0.12);
            --bubble-bg: #2563eb;
            --input-bg: rgba(17,24,39,0.9);
            --shadow: 0 18px 45px rgba(0,0,0,0.35);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--body-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            transition: background 0.25s ease, color 0.25s ease;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        h2 { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button.secondary {
            background: transparent;
            color: #0070f3;
            border: 1px solid #0070f3;
        }

        .error-text {
            color: red;
            font-size: 0.8em;
            margin-top: 5px;
            text-align: left;
        }

        #messagePage {
            display: none;
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .sidebar {
            width: 200px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .category-title {
            font-size: 12px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .category-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .category-item:hover { background: rgba(127,127,127,0.12); }

        .category-item.active {
            background: rgba(0,112,243,0.12);
            color: #0070f3;
            font-weight: bold;
        }

        #exportBtn {
            background: #34c759;
            margin-top: auto;
            font-size: 14px;
            padding: 10px;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        #messagesList {
            height: 450px;
            overflow-y: auto;
            background: var(--list-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-item {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            align-self: flex-end;
            margin-top: 10px;
            align-items: flex-end;
        }

        .meta-info {
            font-size: 11px;
            color: var(--text-sub);
            margin-bottom: 5px;
            display: flex;
            justify-content: flex-end;
            padding-right: 4px;
        }

        .bubble {
            background: var(--bubble-bg);
            padding: 10px 16px;
            border-radius: 18px;
            border-top-right-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
            word-wrap: break-word;
            font-size: 15px;
            color: white;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        body:not(.dark) .bubble {
            color: #000;
        }

        .message-img {
            max-width: 260px;
            max-height: 260px;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            object-fit: contain;
            border: 1px solid var(--border-color);
            cursor: zoom-in;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .message-img:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .del-btn {
            color: #ff3b30;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 11px;
            text-align: right;
            margin-top: 4px;
            opacity: 0.4;
            transition: opacity 0.2s;
            width: auto;
            padding: 0;
        }

        .del-btn:hover { opacity: 1; }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        textarea:focus {
            border-color: rgba(0,112,243,0.5);
        }

        #submitBtn {
            background: #000;
            width: 120px;
            align-self: flex-end;
        }

        body.dark #submitBtn {
            background: #2563eb;
        }

        .preview-box {
            display: none;
            align-items: center;
            gap: 10px;
            background: var(--list-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
        }

        .preview-box img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .preview-info {
            flex: 1;
            font-size: 13px;
            color: var(--text-sub);
        }

        #removeImageBtn {
            width: auto;
            background: #ff3b30;
            padding: 8px 12px;
            font-size: 13px;
            margin: 0;
        }

        .upload-status {
            font-size: 13px;
            color: var(--text-sub);
            display: none;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-color);
            background: #eee;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            width: auto;
            padding: 7px 10px;
            margin: 0;
            background: rgba(127,127,127,0.12);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-size: 14px;
            border-radius: 999px;
        }

        .logout-link {
            font-size: 14px;
            color: #0070f3;
            cursor: pointer;
        }

        #imageModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.78);
            justify-content: center;
            align-items: center;
            padding: 24px;
            cursor: zoom-out;
        }

        #modalImage {
            max-width: 92vw;
            max-height: 88vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
            cursor: default;
        }

        #closeModalBtn {
            position: fixed;
            top: 18px;
            right: 18px;
            width: auto;
            margin: 0;
            padding: 8px 12px;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            border-radius: 999px;
            font-size: 18px;
        }

        @media (max-width: 600px) {
            #messagePage { flex-direction: column; }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

<div id="loginPage" class="card">
    <h2>登录</h2>
    <input type="text" id="loginUsername" placeholder="用户名">
    <input type="password" id="loginPassword" placeholder="密码">
    <button id="loginSubmitBtn">登录</button>
    <button class="secondary" onclick="showRegister()">去注册</button>
</div>

<div id="registerPage" class="card" style="display:none;">
    <h2>注册</h2>
    <input type="text" id="regUsername" placeholder="用户名">
    <input type="password" id="regPassword" placeholder="密码">
    <input type="password" id="regConfirmPassword" placeholder="确认密码">
    <input type="text" id="regInviteCode" placeholder="邀请码 (g6z6q6)">
    <div id="regStatusMsg" class="error-text"></div>
    <button id="registerSubmitBtn">注册</button>
    <button class="secondary" onclick="showLogin()">返回登录</button>
</div>

<div id="messagePage">
    <div class="sidebar">
        <div class="category-title">打卡分类</div>
        <div class="category-list">
            <div class="category-item active">运动打卡区</div>
            <div class="category-item">其他打卡区</div>
        </div>
        <button id="exportBtn">导出表格备份</button>
    </div>

    <div class="main-content">
        <div class="nav-header">
            <div class="user-info-box">
                <img src="avatar.jpg" alt="头像" class="user-avatar">
                <h3 id="welcomeUser">你好, 用户</h3>
            </div>
            <div class="header-actions">
                <button id="themeToggleBtn" class="theme-toggle" type="button">🌙</button>
                <span class="logout-link" onclick="logout()">退出登录</span>
            </div>
        </div>

        <div id="messagesList"></div>

        <div class="input-area">
            <textarea id="contentInput" placeholder="说点什么... 支持 Ctrl+V 粘贴截图"></textarea>

            <div id="uploadStatus" class="upload-status">图片上传中...</div>

            <div id="previewBox" class="preview-box">
                <img id="previewImg" src="">
                <div class="preview-info">
                    图片已上传，发送后会保存到记录里。
                </div>
                <button id="removeImageBtn">移除</button>
            </div>

            <button id="submitBtn">确认发送</button>
        </div>
    </div>
</div>

<div id="imageModal">
    <button id="closeModalBtn" type="button">×</button>
    <img id="modalImage" src="" alt="放大图片">
</div>

<script>
    const CLOUD_NAME = "dn7tjzlhd";
    const UPLOAD_PRESET = "note-images";

    let currentImageUrl = "";

    function formatToBJTime(dateStr) {
        if (!dateStr) return "未知时间";

        let normalizedStr = dateStr;
        if (!dateStr.includes('Z') && !dateStr.includes('+')) {
            normalizedStr = dateStr.replace(' ', 'T') + 'Z';
        }

        const date = new Date(normalizedStr);
        if (isNaN(date.getTime())) return dateStr;

        return new Intl.DateTimeFormat('zh-CN', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).format(date).replace(/\//g, '-');
    }

    function applyTheme(theme) {
        if (theme === "dark") {
            document.body.classList.add("dark");
            document.getElementById("themeToggleBtn").innerText = "☀️";
        } else {
            document.body.classList.remove("dark");
            document.getElementById("themeToggleBtn").innerText = "🌙";
        }
        localStorage.setItem("theme", theme);
    }

    document.getElementById("themeToggleBtn").onclick = () => {
        const isDark = document.body.classList.contains("dark");
        applyTheme(isDark ? "light" : "dark");
    };

    function showLogin() {
        document.getElementById('loginPage').style.display = 'block';
        document.getElementById('registerPage').style.display = 'none';
        document.getElementById('messagePage').style.display = 'none';
    }

    function showRegister() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('registerPage').style.display = 'block';
    }

    function showMessages() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('registerPage').style.display = 'none';
        document.getElementById('messagePage').style.display = 'flex';
        document.getElementById('welcomeUser').innerText = "你好, " + getCookie("username");
        loadMessages();
    }

    function logout() {
        document.cookie = "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        location.reload();
    }

    async function uploadImageToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok || !data.secure_url) {
            console.error(data);
            throw new Error(data.error?.message || "图片上传失败");
        }

        return data.secure_url;
    }

    document.getElementById("contentInput").addEventListener("paste", async (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;

        for (const item of items) {
            if (item.type.startsWith("image/")) {
                e.preventDefault();

                const file = item.getAsFile();
                if (!file) return;

                const uploadStatus = document.getElementById("uploadStatus");
                const submitBtn = document.getElementById("submitBtn");

                try {
                    uploadStatus.style.display = "block";
                    uploadStatus.innerText = "图片上传中...";
                    submitBtn.disabled = true;
                    submitBtn.innerText = "上传中";

                    const imageUrl = await uploadImageToCloudinary(file);
                    currentImageUrl = imageUrl;

                    document.getElementById("previewImg").src = imageUrl;
                    document.getElementById("previewBox").style.display = "flex";

                    uploadStatus.innerText = "图片上传成功";
                    setTimeout(() => {
                        uploadStatus.style.display = "none";
                    }, 1200);
                } catch (err) {
                    alert("图片上传失败：" + err.message);
                    uploadStatus.style.display = "none";
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "确认发送";
                }

                break;
            }
        }
    });

    document.getElementById("removeImageBtn").onclick = () => {
        currentImageUrl = "";
        document.getElementById("previewImg").src = "";
        document.getElementById("previewBox").style.display = "none";
    };

    document.getElementById('exportBtn').onclick = () => {
        const items = Array.from(document.querySelectorAll('.message-item'));
        if (items.length === 0) return alert("当前没有数据可以导出");

        let csvContent = "\uFEFF日期时间,内容,图片链接\n";

        items.forEach(item => {
            const timeStr = item.querySelector('.meta-info span').innerText;
            let content = item.querySelector('.bubble')?.innerText || "";
            const img = item.querySelector('.message-img');
            const imageUrl = img ? img.src : "";

            content = `"${content.replace(/"/g, '""')}"`;
            csvContent += `${timeStr},${content},${imageUrl}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `打卡备份_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    document.getElementById('loginSubmitBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        const res = await fetch('/api/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
            document.cookie = `username=${username}; path=/; max-age=31536000`;
            showMessages();
        } else {
            alert("登录失败");
        }
    };

    document.getElementById('registerSubmitBtn').onclick = async () => {
        const name = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        if (document.getElementById('regInviteCode').value.trim() !== "g6z6q6") {
            return alert("邀请码错误");
        }

        const res = await fetch('/api/register', {
            method: 'POST',
            body: JSON.stringify({ name, password })
        });

        if (res.ok) {
            alert("注册成功");
            showLogin();
        }
    };

    async function loadMessages() {
        const list = document.getElementById('messagesList');

        try {
            const res = await fetch('/api/message');
            const messages = await res.json();

            list.innerHTML = messages.map(msg => {
                const displayTime = formatToBJTime(msg.created_at);
                const safeContent = escapeHtml(msg.content || "");
                const safeImageUrl = msg.image_url ? escapeAttr(msg.image_url) : "";

                return `
                    <div class="message-item">
                        <div class="meta-info">
                            <span>${displayTime}</span>
                        </div>

                        ${safeContent ? `<div class="bubble">${safeContent}</div>` : ""}

                        ${safeImageUrl ? `<img class="message-img" src="${safeImageUrl}" alt="图片" onclick="openImageModal(this.src)">` : ""}

                        <button class="del-btn" onclick="deleteMsg(${msg.id})">删除记录</button>
                    </div>
                `;
            }).join('');

            list.scrollTop = list.scrollHeight;
        } catch (e) {
            list.innerHTML = "加载失败";
        }
    }

    document.getElementById('submitBtn').onclick = async () => {
        const content = document.getElementById('contentInput').value.trim();

        if (!content && !currentImageUrl) {
            return alert("请输入文字或粘贴图片");
        }

        const res = await fetch('/api/message', {
            method: 'POST',
            body: JSON.stringify({
                name: getCookie("username"),
                content: content,
                image_url: currentImageUrl || null
            })
        });

        if (res.ok) {
            document.getElementById('contentInput').value = '';
            currentImageUrl = "";
            document.getElementById("previewImg").src = "";
            document.getElementById("previewBox").style.display = "none";
            loadMessages();
        } else {
            alert("发送失败");
        }
    };

    async function deleteMsg(id) {
        if (!confirm("确定删除?")) return;

        await fetch(`/api/message?id=${id}`, {
            method: 'DELETE'
        });

        loadMessages();
    }

    function openImageModal(src) {
        const modal = document.getElementById("imageModal");
        const modalImage = document.getElementById("modalImage");
        modalImage.src = src;
        modal.style.display = "flex";
    }

    function closeImageModal() {
        const modal = document.getElementById("imageModal");
        const modalImage = document.getElementById("modalImage");
        modal.style.display = "none";
        modalImage.src = "";
    }

    document.getElementById("imageModal").onclick = closeImageModal;

    document.getElementById("modalImage").onclick = (e) => {
        e.stopPropagation();
    };

    document.getElementById("closeModalBtn").onclick = closeImageModal;

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            closeImageModal();
        }
    });

    function getCookie(name) {
        return document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)')?.pop() || '';
    }

    function escapeHtml(t) {
        return String(t)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function escapeAttr(t) {
        return String(t)
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    applyTheme(localStorage.getItem("theme") || "light");

    if (getCookie("username")) {
        showMessages();
    } else {
        showLogin();
    }
</script>

</body>
</html>
