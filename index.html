<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的永久留言板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; color: #333; }
        h1 { text-align: center; color: #4a4a4a; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .message-name { font-weight: bold; color: #0070f3; }
        .message-time { font-size: 0.8em; color: #888; float: right; }
        #loading { text-align: center; color: #666; padding: 10px; }
    </style>
</head>
<body>

    <h1>📝 永久留言板</h1>

    <!-- 输入区域 -->
    <div class="card">
        <input type="text" id="nameInput" placeholder="你的名字">
        <textarea id="contentInput" rows="3" placeholder="写下你想说的话..."></textarea>
        <button id="submitBtn">发布留言</button>
    </div>

    <!-- 留言列表区域 -->
    <div class="card">
        <h3>最新留言</h3>
        <div id="loading">加载中...</div>
        <div id="messagesList"></div>
    </div>

    <!-- 👇 关键：把 script 放在 body 最后，确保 DOM 已加载 -->
        <script>
        // API 地址
        const API_URL = "/api/message";
        const LOGIN_API_URL = "/api/login";

        // 获取 DOM 元素
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('nameInput');
        const contentInput = document.getElementById('contentInput');
        const messagesList = document.getElementById('messagesList');
        const loadingDiv = document.getElementById('loading');
        
        // 新增：登录相关元素
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');
        const closeBtn = document.querySelector('.close');

        // 1. 检查登录状态
        function checkAuth() {
            const token = document.cookie.replace(/(?:(?:^|.*;\s*)auth_token\s*\=\s*([^;]*).*$)|^.*$/, "$1");
            
            if (!token) {
                // 如果没有 Cookie，显示登录弹窗
                loginModal.style.display = 'flex';
            } else {
                // 如果有 Cookie，加载留言
                loadMessages();
            }
        }

        // 2. 登录功能
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${LOGIN_API_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
                    method: 'GET' // 使用 GET 请求，参数在 URL 里
                });

                if (res.ok) {
                    const data = await res.json();
                    // 设置 Cookie，有效期 1 年
                    document.cookie = `auth_token=${data.token}; path=/; max-age=31536000`;
                    loginModal.style.display = 'none';
                    loadMessages();
                } else {
                    alert('登录失败，请检查用户名密码');
                }
            } catch (err) {
                console.error(err);
                alert('网络错误');
            }
        });

        // 3. 关闭弹窗
        closeBtn.addEventListener('click', () => {
            loginModal.style.display = 'none';
        });

        // 4. 加载留言（带删除按钮）
        async function loadMessages() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                loadingDiv.style.display = 'none';
                messagesList.innerHTML = '';

                if (data.length === 0) {
                    messagesList.innerHTML = '<p style="text-align:center; color:#999;">还没有留言，快来抢沙发！</p>';
                    return;
                }

                data.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-item';
                    // 安全转义防止 XSS
                    const safeName = escapeHtml(msg.name);
                    const safeContent = escapeHtml(msg.content);
                    const timeStr = new Date(msg.created_at).toLocaleString();

                    // 动态生成删除按钮 (如果用户有权限)
                    let deleteBtnHtml = '';
                    if (msg.can_delete) {
                        deleteBtnHtml = `<button class="delete-btn" onclick="deleteMessage(${msg.id})">删除</button>`;
                    }

                    div.innerHTML = `
                        <span class="message-name">${safeName}</span>
                        <span class="message-time">${timeStr}</span>
                        ${deleteBtnHtml}
                        <p style="margin-top:5px; word-break: break-word;">${safeContent}</p>
                    `;
                    messagesList.appendChild(div);
                });
            } catch (e) {
                loadingDiv.innerText = "加载失败，请稍后重试。";
                loadingDiv.style.display = 'block';
                console.error("Load error:", e);
            }
        }

        // 5. 提交留言函数
        async function handleSubmit() {
            const name = nameInput.value.trim();
            const content = contentInput.value.trim();

            if (!name || !content) {
                alert('请填写姓名和留言内容');
                return;
            }

            // 锁定按钮防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '发布中...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, content })
                });

                if (response.ok) {
                    alert('发布成功!');
                    // 清空输入框
                    nameInput.value = '';
                    contentInput.value = '';
                    
                    // 成功后立即刷新列表
                    await loadMessages(); 
                    
                } else {
                    const errorText = await response.text();
                    alert('发布失败: ' + errorText);
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
                console.error("Submit error:", e);
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitBtn.textContent = '发布留言';
            }
        }

        // 6. 删除留言函数 (挂载到 window 以便 HTML 调用)
        window.deleteMessage = async (id) => {
            if (!confirm('确定要删除这条留言吗？')) return;

            try {
                const res = await fetch(`${API_URL}?id=${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    alert('删除成功');
                    await loadMessages(); // 刷新列表
                } else {
                    alert('删除失败，可能是因为权限不足');
                }
            } catch (e) {
                alert('网络错误');
            }
        };

        // 防止 XSS 攻击的工具函数
        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 7. 初始化：绑定事件并检查登录
        submitBtn.addEventListener('click', handleSubmit);
        checkAuth(); // 启动时检查登录
    </script>
    <!-- 登录弹窗 -->
<div id="login-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>登录</h2>
    <form id="login-form">
      <input type="text" id="login-username" placeholder="用户名" required>
      <input type="password" id="login-password" placeholder="密码" required>
      <button type="submit">登录</button>
    </form>
  </div>
</div>

<style>
  /* 模态框背景 */
  .modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }

  /* 模态框内容 */
  .modal-content {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    max-width: 90%;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
  }
</style>
</body>
</html>
