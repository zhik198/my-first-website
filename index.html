<script>
    const API_URL = "/api/message"; 

    // 1. 页面加载时获取留言
    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const list = document.getElementById('messagesList');
            document.getElementById('loading').style.display = 'none';
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#999;">还没有留言，快来抢沙发！</p>';
                return;
            }

            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-item';
                div.innerHTML = `
                    <span class="message-name">${escapeHtml(msg.name)}</span>
                    <span class="message-time">${new Date(msg.created_at).toLocaleString()}</span>
                    <p>${escapeHtml(msg.content)}</p>
                `;
                list.appendChild(div);
            });
        } catch (e) {
            document.getElementById('loading').innerText = "加载失败，请检查 API 地址是否正确。";
            console.error(e);
        }
    }

    // 2. 提交留言（修正版）
    document.addEventListener('DOMContentLoaded', () => {
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('nameInput');
        const contentInput = document.getElementById('contentInput');

        submitBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            const content = contentInput.value.trim();

            if (!name || !content) {
                alert('请填写姓名和留言内容');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '发布中...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, content })
                });

                if (response.ok) {
                    alert('发布成功!');
                    nameInput.value = '';
                    contentInput.value = '';

                    // 👇👇 关键：提交成功后立即刷新留言列表
                    await loadMessages();

                } else {
                    alert('发布失败: ' + await response.text());
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '发布留言';
            }
        });
    });

    // 防止 XSS 攻击的简单函数
    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // 初始化
    loadMessages();
</script>
